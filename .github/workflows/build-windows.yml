name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Build Go Sidecars
        run: |
          cd sidecars/FB
          go build -o fb_generator.exe ./cmd/report_generator
          cd ../Vorpruefung
          go build -o vp_generator.exe .

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "windows-release"
          cache-on-failure: true

      - name: Build GUI
        run: cargo build --release -p app

      - name: Zip artifact
        run: Compress-Archive -Path target/release/app.exe -DestinationPath target/release/app-x86_64-pc-windows-msvc.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: target/release/app-x86_64-pc-windows-msvc.zip
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/app-x86_64-pc-windows-msvc.zip
